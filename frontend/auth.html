<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Tester — Account Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --panel:   #161b22;
      --border:  #30363d;
      --text:    #c9d1d9;
      --muted:   #8b949e;
      --primary: #58a6ff;
      --success: #3fb950;
      --danger:  #f85149;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    h2 { font-size: 20px; font-weight: 700; text-align: center; }
    p  { font-size: 13px; color: var(--muted); text-align: center; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 500; }
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
    }
    input[type="password"]:focus { border-color: var(--primary); }
    .msg {
      font-size: 12px;
      text-align: center;
      display: none;
    }
    .msg.error   { color: var(--danger); }
    .msg.success { color: var(--success); }
    button {
      cursor: pointer; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; padding: 10px 16px;
      width: 100%;
      background: var(--primary); color: #0d1117;
      transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: .85; }
  </style>
</head>
<body>
<div class="box">
  <h2>🎙 Agent Tester</h2>
  <p id="subtitle">Set a password for your account.</p>
  <div class="field">
    <label for="pw1">Password</label>
    <input type="password" id="pw1" autocomplete="new-password" placeholder="At least 6 characters" />
  </div>
  <div class="field">
    <label for="pw2">Confirm Password</label>
    <input type="password" id="pw2" autocomplete="new-password" />
  </div>
  <div class="msg" id="msg"></div>
  <button id="btn" onclick="submit()">Set Password</button>
</div>

<script>const BASE_PATH = '/VAT';</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async () => {
  const hashParams   = new URLSearchParams(window.location.hash.slice(1));
  const searchParams = new URLSearchParams(window.location.search);
  const msgEl        = document.getElementById('msg');

  // Handle error redirects from Supabase (e.g. expired link)
  if (hashParams.get('error')) {
    const desc = hashParams.get('error_description')?.replace(/\+/g, ' ') || 'The link is invalid or has expired.';
    showMsg(desc, 'error');
    document.getElementById('btn').disabled = true;
    return;
  }

  // Adjust subtitle for password reset vs invite
  const urlType = hashParams.get('type') || searchParams.get('type');
  if (urlType === 'recovery') {
    document.getElementById('subtitle').textContent = 'Enter a new password for your account.';
    document.getElementById('btn').textContent      = 'Reset Password';
  }

  // Initialise Supabase
  let client;
  try {
    const config = await fetch(BASE_PATH + '/api/config').then(r => r.json());
    client = supabase.createClient(config.supabase_url, config.supabase_anon_key);
  } catch {
    showMsg('Could not reach server. Please try again.', 'error');
    document.getElementById('btn').disabled = true;
    return;
  }

  // Wait for the session to be established (handles both implicit hash and PKCE code)
  const sessionReady = await new Promise(resolve => {
    const { data: { subscription } } = client.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' || event === 'PASSWORD_RECOVERY') {
        subscription.unsubscribe();
        resolve(session);
      }
    });
    // Also check if session already exists (implicit flow sets it immediately)
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) { subscription.unsubscribe(); resolve(session); }
    });
    // Timeout fallback
    setTimeout(() => { subscription.unsubscribe(); resolve(null); }, 8000);
  });

  if (!sessionReady) {
    showMsg('Session could not be established. The link may have expired — please request a new one.', 'error');
    document.getElementById('btn').disabled = true;
    return;
  }

  // Expose client + submit function to the button
  window._supaClient = client;
  document.getElementById('pw1').focus();

  window.submit = async function () {
    const pw1   = document.getElementById('pw1').value;
    const pw2   = document.getElementById('pw2').value;
    const btn   = document.getElementById('btn');

    if (!pw1 || pw1.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
    if (pw1 !== pw2)             { showMsg('Passwords do not match.', 'error'); return; }

    btn.disabled    = true;
    btn.textContent = 'Saving…';
    hideMsg();

    const { error } = await window._supaClient.auth.updateUser({ password: pw1 });
    if (error) {
      showMsg(error.message, 'error');
      btn.disabled    = false;
      btn.textContent = 'Set Password';
      return;
    }

    showMsg('Password set! Redirecting…', 'success');
    setTimeout(() => { window.location.href = BASE_PATH + '/'; }, 1500);
  };

  document.getElementById('pw2').addEventListener('keydown', e => { if (e.key === 'Enter') window.submit(); });

  function showMsg(text, type) {
    msgEl.textContent  = text;
    msgEl.className    = 'msg ' + type;
    msgEl.style.display = 'block';
  }
  function hideMsg() { msgEl.style.display = 'none'; }
})();
</script>
</body>
</html>
